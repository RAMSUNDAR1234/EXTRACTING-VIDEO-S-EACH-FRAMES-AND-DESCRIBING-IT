name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=100
          full_diff=$(git diff origin/${{ github.event.pull_request.base.ref }}..HEAD)
          echo "$full_diff" > /tmp/pr_diff.txt
          diff_stat=$(git diff --stat origin/${{ github.event.pull_request.base.ref }}..HEAD)
          echo "diff_size=$(wc -c < /tmp/pr_diff.txt)" >> $GITHUB_OUTPUT
          echo "diff_stat<<EOF" >> $GITHUB_OUTPUT
          echo "$diff_stat" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get Changed Files
        id: files
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=100
          changed_files=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}..HEAD | head -20)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$changed_files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AI Code Review
        id: ai-review
        env:
          JUSPAY_API_KEY: ${{ secrets.JUSPAY_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          FILES: ${{ steps.files.outputs.files }}
          DIFF_STAT: ${{ steps.diff.outputs.diff_stat }}
        run: |
          python3 << 'PYEOF'
import os, json, urllib.request
api_key = os.environ['JUSPAY_API_KEY']
pr_title = os.environ.get('PR_TITLE', '')
pr_body = os.environ.get('PR_BODY', '')
files = os.environ.get('FILES', '')
diff_stat = os.environ.get('DIFF_STAT', '')

with open('/tmp/pr_diff.txt', 'r') as f:
    diff_content = f.read()[:15000]

prompt = f"""You are an expert senior software engineer conducting a thorough code review.

PR Title: {pr_title}
PR Description: {pr_body}

Diff Statistics:
{diff_stat}

Changed Files:
{files}

Code Diff (first 15KB):
{diff_content}

Provide structured code review with:
## Overall Assessment
## Code Quality
## Best Practices
## Potential Issues
## Suggestions
## Testing

Format in Markdown."""

data = {'model': 'open-large', 'messages': [{'role': 'system', 'content': 'You are an expert senior software engineer. Provide actionable code review feedback.'}, {'role': 'user', 'content': prompt}], 'temperature': 0.2, 'max_tokens': 3000}
req = urllib.request.Request('https://grid.ai.juspay.net/v1/chat/completions', data=json.dumps(data).encode(), headers={'Authorization': f'Bearer {api_key}', 'Content-Type': 'application/json'}, method='POST')

try:
    with urllib.request.urlopen(req) as resp:
        result = json.loads(resp.read().decode())
        review = result.get('choices', [{}])[0].get('message', {}).get('content', '')
        if not review:
            raise Exception('Empty response')
except Exception as e:
    review = f'## AI Review\n\nUnable to generate AI review: {str(e)}\n\n**Diff Stats:**\n```\n{diff_stat}\n```'

with open('/tmp/ai_review.txt', 'w') as f:
    f.write(review)
PYEOF

      - name: Post AI Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/ai_review.txt', 'utf8');
            const headSha = context.payload.pull_request.head.sha;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const aiReviewPrefix = '## 🤖 AI Code Review';
            const existingAiReview = comments.find(c => c.body.includes(aiReviewPrefix));
            const reviewBody = aiReviewPrefix + '\n\n*Generated for commit `' + headSha + '`*\n\n' + review;
            if (existingAiReview) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingAiReview.id,
                body: reviewBody
              });
              console.log('Updated existing AI review');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: reviewBody
              });
              console.log('Posted new AI review');
            }
