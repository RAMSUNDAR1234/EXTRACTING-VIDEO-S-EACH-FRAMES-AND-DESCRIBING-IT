name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=100
          git diff origin/${{ github.event.pull_request.base.ref }}..HEAD > /tmp/pr_diff.txt
          git diff --stat origin/${{ github.event.pull_request.base.ref }}..HEAD > /tmp/diff_stat.txt

      - name: Get Changed Files
        id: files
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=100
          git diff --name-only origin/${{ github.event.pull_request.base.ref }}..HEAD > /tmp/changed_files.txt

      - name: AI Code Review
        id: ai-review
        env:
          JUSPAY_API_KEY: ${{ secrets.JUSPAY_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 .github/scripts/ai_code_review.py

      - name: Post AI Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/ai_review.txt', 'utf8');
            const headSha = context.payload.pull_request.head.sha;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const aiReviewPrefix = '## 🤖 AI Code Review';
            const existingAiReview = comments.find(c => c.body.includes(aiReviewPrefix));
            const reviewBody = aiReviewPrefix + '\n\n*Generated for commit `' + headSha + '`*\n\n' + review;
            if (existingAiReview) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingAiReview.id,
                body: reviewBody
              });
              console.log('Updated existing AI review');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: reviewBody
              });
              console.log('Posted new AI review');
            }
