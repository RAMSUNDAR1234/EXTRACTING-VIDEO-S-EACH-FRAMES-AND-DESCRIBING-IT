name: Auto PR Description with AI

on:
  pull_request:
    types: [opened]

jobs:
  generate-description:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Info
        id: info
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=100
          git log --pretty=format:"%h %s" origin/${{ github.event.pull_request.base.ref }}..HEAD > /tmp/commits.txt
          git diff --name-status origin/${{ github.event.pull_request.base.ref }}..HEAD > /tmp/files.txt
          echo "title=${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          echo "branch=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          echo "base=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          added=$(grep -c "^A" /tmp/files.txt 2>/dev/null || echo "0")
          modified=$(grep -c "^M" /tmp/files.txt 2>/dev/null || echo "0")
          deleted=$(grep -c "^D" /tmp/files.txt 2>/dev/null || echo "0")
          stats=$(git diff --shortstat origin/${{ github.event.pull_request.base.ref }}..HEAD | tr -d '\n')
          echo "added=$added" >> "$GITHUB_OUTPUT"
          echo "modified=$modified" >> "$GITHUB_OUTPUT"
          echo "deleted=$deleted" >> "$GITHUB_OUTPUT"
          echo "stats=$stats" >> "$GITHUB_OUTPUT"

      - name: Run AI Script
        env:
          JUSPAY_API_KEY: ${{ secrets.JUSPAY_API_KEY }}
          PR_TITLE: ${{ steps.info.outputs.title }}
          PR_BRANCH: ${{ steps.info.outputs.branch }}
          BASE_BRANCH: ${{ steps.info.outputs.base }}
          ADDED: ${{ steps.info.outputs.added }}
          MODIFIED: ${{ steps.info.outputs.modified }}
          DELETED: ${{ steps.info.outputs.deleted }}
          STATS: ${{ steps.info.outputs.stats }}
        run: python3 .github/scripts/generate_pr_description.py

      - name: Update PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const desc = fs.readFileSync('/tmp/ai_description.txt', 'utf8');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            let body = desc;
            if (pr.body && pr.body.trim() && !pr.body.includes('Auto-generated')) {
              body = '## Original\n\n' + pr.body + '\n\n---\n\n' + desc;
            }
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: body
            });
